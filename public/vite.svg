<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" rx="8" fill="url(#grad)" />
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
  </defs>
  
  <!-- Top and Bottom Connected Nodes representing Workflow -->
  <path d="M 6,6 L 26,6" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 6,26 L 26,26" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  
  <circle cx="6" cy="6" r="2.5" fill="#ffffff" />
  <circle cx="16" cy="6" r="2.5" fill="#10b981" />
  <circle cx="26" cy="6" r="2.5" fill="#ffffff" />
  
  <circle cx="6" cy="26" r="2.5" fill="#ffffff" />
  <circle cx="16" cy="26" r="2.5" fill="#10b981" />
  <circle cx="26" cy="26" r="2.5" fill="#ffffff" />

  <!-- PF Text Centered -->
  <text x="16" y="17" font-family="'Segoe UI', -apple-system, Roboto, sans-serif" font-weight="900" font-size="11" fill="#ffffff" text-anchor="middle" dominant-baseline="middle">PF</text>
</svg>
